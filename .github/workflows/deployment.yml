name: Continuous Deployment

on:
  workflow_run:
    workflows: ["Continuous Integration - Tests (Zig)"]
    types: [completed]
    branches: [main]

concurrency:
  group: deployment-${{ github.ref_name }}
  cancel-in-progress: false

env:
  ZINE_OUTPUT_DIR: public

jobs:
  deployment:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Zine
        uses: kristoff-it/setup-zine@v1
        with:
          version: v0.11.2

      - name: Build
        run: zine release

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ${{ env.ZINE_OUTPUT_DIR }} --project-name=${{ github.event.repository.name }} --branch=${{ github.ref_name }}
